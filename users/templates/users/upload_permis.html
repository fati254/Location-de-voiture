{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="card shadow border-0 rounded-4 p-4">

        <h2 class="fw-bold mb-4">
            Vérification du permis
        </h2>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">
                    Permis Recto
                </label>

                {{ form.permis_recto }}
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Permis Verso
                </label>

                {{ form.permis_verso }}
            </div>

            <button type="submit"
                    class="btn btn-dark rounded-3">

                Envoyer le permis

            </button>

        </form>

    </div>

</div>

{% endblock %}
