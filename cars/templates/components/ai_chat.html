<!-- Bouton flottant -->
<button id="ai-chat-button">
    💬
</button>

<!-- Fenêtre chat -->
<div id="ai-chat-box">

    <div class="chat-header">
        Assistant IA AutoLux
        <span id="close-chat">✖</span>
    </div>

    <div id="chat-messages"></div>

    <div class="chat-input-area">
        <textarea
            id="chat-input"
            placeholder="Décrivez votre besoin..."
        ></textarea>

        <button id="send-message">
            Envoyer
        </button>
    </div>

</div>
